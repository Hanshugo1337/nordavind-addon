name: Package and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create addon zip
        run: |
          zip -r NordavindLC-${{ steps.version.outputs.version }}.zip NordavindLC/ \
            -x "NordavindLC/.*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NordavindLC-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Get release notes
        id: notes
        run: |
          gh release view "${{ steps.version.outputs.version }}" --json body -q .body > release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CurseForge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
        run: |
          CHANGELOG=$(cat release_notes.md)
          jq -n \
            --arg changelog "$CHANGELOG" \
            --arg name "NordavindLC ${{ steps.version.outputs.version }}" \
            '{
              changelog: $changelog,
              changelogType: "markdown",
              displayName: $name,
              gameVersions: [14422],
              releaseType: "release"
            }' > metadata.json

          curl -s -X POST \
            "https://wow.curseforge.com/api/projects/1499638/upload-file" \
            -H "X-Api-Token: $CF_API_KEY" \
            -F "metadata=<metadata.json;type=application/json" \
            -F "file=@NordavindLC-${{ steps.version.outputs.version }}.zip"
